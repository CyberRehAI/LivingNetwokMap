<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <style>
    .actor { fill:#f0f8ff; stroke:#333; stroke-width:1.2 }
    .uc { fill:#fff7e6; stroke:#333; stroke-width:1.2 }
    .txt { font-family: Arial, sans-serif; font-size:13px; fill:#111 }
    .title { font-weight: bold; font-size:15px }
    .arrow { stroke:#333; stroke-width:1.8; fill:none; marker-end:url(#a) }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Actors -->
  <rect x="40" y="40" width="140" height="80" class="actor" rx="8"/>
  <text x="110" y="62" class="txt title" text-anchor="middle">Operator</text>
  <text x="110" y="86" class="txt" text-anchor="middle">(Frontend user)</text>

  <rect x="40" y="150" width="140" height="80" class="actor" rx="8"/>
  <text x="110" y="172" class="txt title" text-anchor="middle">Agent</text>
  <text x="110" y="196" class="txt" text-anchor="middle">(Metrics reporter)</text>

  <!-- Use cases -->
  <rect x="260" y="20" width="220" height="60" class="uc" rx="6"/>
  <text x="370" y="42" class="txt" text-anchor="middle">View Live Topology</text>

  <rect x="260" y="100" width="220" height="60" class="uc" rx="6"/>
  <text x="370" y="122" class="txt" text-anchor="middle">Run Network Scan</text>

  <rect x="260" y="180" width="220" height="60" class="uc" rx="6"/>
  <text x="370" y="202" class="txt" text-anchor="middle">Auto-Discover Topology</text>

  <rect x="260" y="260" width="220" height="60" class="uc" rx="6"/>
  <text x="370" y="282" class="txt" text-anchor="middle">Manual Node Management</text>

  <!-- Arrows from Operator -->
  <path d="M180 80 L260 50" class="arrow" />
  <path d="M180 80 L260 120" class="arrow" />
  <path d="M180 80 L260 200" class="arrow" />
  <path d="M180 80 L260 280" class="arrow" />

  <!-- Arrow from Agent to View Live Topology / Manual Node Management -->
  <path d="M180 190 L260 60" class="arrow" />
  <path d="M180 190 L260 300" class="arrow" />

  <text x="20" y="320" class="txt">Use case diagram (simplified)</text>
</svg>